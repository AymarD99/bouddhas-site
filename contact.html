<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Bouddhas</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo">Bouddhas</a>
      <div class="nav-links">
        <a href="/">Accueil</a>
        <a href="/produits">Boutique</a>
        <a href="/contact">Contact</a>
        <a href="/panier" class="cart-link">Panier <span id="cart-count">0</span></a>
      </div>
    </div>
  </nav>

  <section class="section" style="max-width:600px;">
    <h2 class="section-title">Contact</h2>
    <p class="section-subtitle">Une question ? Un conseil ? Écrivez-nous</p>

    <div style="background:var(--white);padding:2.5rem;border-radius:15px;box-shadow:var(--shadow);">
      <p style="margin-bottom:1.5rem;text-align:center;">
        Pour toute question, contactez-nous via nos réseaux ou notre boutique Shopify.
      </p>
      <div style="display:flex;flex-direction:column;gap:1rem;">
        <div style="display:flex;align-items:center;gap:1rem;padding:1rem;background:var(--beige);border-radius:10px;">
          <span style="font-size:1.5rem;">🛒</span>
          <span>Boutique Shopify : <a href="https://my-bouddha-store.myshopify.com" target="_blank" style="color:var(--gold-dark);">my-bouddha-store.myshopify.com</a></span>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p style="font-size:1.5rem;font-family:'Playfair Display',serif;color:var(--gold);margin-bottom:0.5rem;">Bouddhas</p>
      <p>&copy; 2026 Bouddhas — Tous droits réservés</p>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/shopify.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

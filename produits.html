<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boutique — Bouddhas</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo">Bouddhas</a>
      <div class="nav-links">
        <a href="/">Accueil</a>
        <a href="/produits">Boutique</a>
        <a href="/a-propos">À propos</a>
        <a href="/livraison">Livraison</a>
        <a href="/pierres">Guide pierres</a>
        <a href="/faq">FAQ</a>
        <a href="/contact">Contact</a>
        <div class="search-box">
          <span class="icon">🔍</span>
          <input type="text" id="search-input" placeholder="Rechercher..." autocomplete="off">
          <div class="search-results" id="search-results"></div>
        </div>
        <a href="/panier" class="cart-link">Panier <span id="cart-count">0</span></a>
      </div>
    </div>
  </nav>

  <section class="section">
    <h2 class="section-title">Notre boutique</h2>
    <p class="section-subtitle">Artisanat spirituel — chaque pièce est unique</p>

    <div style="display:flex;gap:1rem;margin-bottom:2rem;flex-wrap:wrap;justify-content:center;">
      <a href="/produits" class="btn-primary" style="font-size:0.9rem;padding:0.6rem 1.5rem;">Tous</a>
      <a href="/produits?categorie=Bague" class="btn-primary" style="font-size:0.9rem;padding:0.6rem 1.5rem;background:transparent;color:var(--gold-dark);border:2px solid var(--gold);">Bagues</a>
      <a href="/produits?categorie=Pendentif" class="btn-primary" style="font-size:0.9rem;padding:0.6rem 1.5rem;background:transparent;color:var(--gold-dark);border:2px solid var(--gold);">Pendentifs</a>
      <a href="/produits?categorie=Bracelet" class="btn-primary" style="font-size:0.9rem;padding:0.6rem 1.5rem;background:transparent;color:var(--gold-dark);border:2px solid var(--gold);">Bracelets</a>
    </div>

    <div class="product-grid" id="product-grid">
      <div style="text-align:center;padding:3rem;color:var(--text-light);">Chargement...</div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p style="font-size:1.5rem;font-family:'Playfair Display',serif;color:var(--gold);margin-bottom:0.5rem;">Bouddhas</p>
      <p>&copy; 2026 Bouddhas — Tous droits réservés</p>
    </div>
  </footer>

  <div id="toast" class="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/shopify.js"></script>
  <script src="js/produits.js"></script>
</body>
</html>

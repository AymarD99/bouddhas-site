<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panier — Bouddhas</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;400&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo">Bouddhas</a>
      <div class="nav-links">
        <a href="/">Accueil</a>
        <a href="/produits">Boutique</a>
        <a href="/contact">Contact</a>
        <a href="/panier" class="cart-link">Panier <span id="cart-count">0</span></a>
      </div>
    </div>
  </nav>

  <div class="cart-page">
    <h2 class="section-title" style="margin-bottom:2rem;">Votre panier</h2>

    <div id="cart-items">
      <div style="text-align:center;padding:3rem;color:var(--text-light);">Votre panier est vide</div>
    </div>

    <div id="cart-summary" style="display:none;">
      <div class="cart-total">
        Total : <span id="cart-total">0,00 €</span>
      </div>
      <a id="checkout-btn" class="btn-checkout">Commander via Shopify ✅</a>
    </div>
  </div>

  <footer>
    <div class="container">
      <p style="font-size:1.5rem;font-family:'Playfair Display',serif;color:var(--gold);margin-bottom:0.5rem;">Bouddhas</p>
      <p>&copy; 2026 Bouddhas — Tous droits réservés</p>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/shopify.js"></script>
  <script src="js/panier.js"></script>
</body>
</html>
